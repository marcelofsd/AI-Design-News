name: Weekly Feed Refresh

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday 06:00 UTC (07:00 CET)
  workflow_dispatch:        # Manual trigger from Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Fetch live articles via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-feed.js

      - name: Commit feed.json
        run: |
          git config user.name "ai-design-news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add feed.json
          git diff --cached --quiet || git commit -m "chore: weekly feed refresh $(date -u +%Y-%m-%d)"
          git push
